<!DOCTYPE html>
<html>
<head>
<title>NEB Verify</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f2f2f2;
}

/* TOP HEADER */
.topbar{
    background:#f5f5f5;
    padding:8px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.left{
    display:flex;
    align-items:center;
}

.left img{
    width:45px;
    margin-right:10px;
}

.center{
    color:red;
    font-weight:bold;
}

.right a{
    margin-right:10px;
    text-decoration:none;
    color:black;
}

/* BLUE BAR */
.bluebar{
    background:#1e4fa1;
    color:white;
    padding:10px 20px;
}

/* MAIN BOX */
.container{
    background:white;
    width:80%;
    margin:20px auto;
    padding:20px;
    position:relative;
}

/* BUTTON */
.btn{
    background:#1e4fa1;
    color:white;
    padding:10px;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
    <div class="left">
        <img src="logo.png">
        <div style="font-size:13px;">
            <div><b>Government of Nepal</b></div>
            <div>Ministry of Education, Science and Technology</div>
            <div style="color:red;">Curriculum Development Centre, LOE</div>
        </div>
    </div>

    <div class="center">
        Online System for Issuance of Letter of Equivalence
    </div>

    <div class="right">
        <a href="#">Help</a>
        <a href="#">Notice</a>
        <a href="#">FAQ</a>
        <a href="#" style="background:#1e4fa1;color:white;padding:5px;">Login</a>
    </div>
</div>

<div class="bluebar">
    ← Go Back
</div>

<!-- MAIN -->
<div class="container" id="result"></div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(id){
    document.getElementById("result").innerHTML = `
        <h2>Certificate ID: ${id}</h2>

        <iframe src="pdf/${id}.pdf" width="100%" height="600px"></iframe>

        <br><br>

        <a class="btn" href="pdf/${id}.pdf" download>Download Certificate</a>
    `;
}else{
    document.getElementById("result").innerHTML = "Invalid QR Code";
}
</script>

</body>
</html>
