<!DOCTYPE html>
<html>
<head>
<title>NEB Certificate Verification</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

/* HEADER */
.top-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  background: #fff;
}

/* LEFT */
.left-section {
  display: flex;
  align-items: center;
}

.logo {
  height: 45px;
  margin-right: 10px;
}

.gov-text {
  font-size: 13px;
  line-height: 1.3;
}

/* CENTER */
.center-title {
  color: red;
  font-weight: bold;
  font-size: 16px;
}

/* RIGHT */
.right-section {
  display: flex;
  align-items: center;
}

.right-section a {
  margin-right: 15px;
  text-decoration: none;
  color: #333;
  font-size: 14px;
}

.login-btn {
  background: #2f5dab;
  color: white;
  border: none;
  padding: 6px 12px;
  cursor: pointer;
}

/* BLUE BAR */
.blue-bar {
  background: #2f5dab;
  color: white;
  padding: 10px 20px;
  font-weight: bold;
}

/* MAIN */
.container {
  padding: 30px;
  text-align: center;
}

/* CERT BOX */
.cert-box {
  background: white;
  padding: 20px;
  border: 1px solid #ccc;
  display: inline-block;
  max-width: 600px;
}

.cert-box img {
  width: 100%;
}

/* BUTTON */
.download-btn {
  margin-top: 15px;
  padding: 10px 20px;
  background: #2f5dab;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- TOP HEADER -->
<div class="top-header">

  <div class="left-section">
    <img src="logo.png" class="logo">

    <div class="gov-text">
      <div>Government of Nepal</div>
      <div>Ministry of Education, Science and Technology</div>
      <div>Curriculum Development Centre, LOE</div>
    </div>
  </div>

  <div class="center-title">
    Online System for Issuance of Letter of Equivalence
  </div>

  <div class="right-section">
    <a href="#">Help</a>
    <a href="#">Notice</a>
    <a href="#">FAQ</a>
    <button class="login-btn">🔒 Login</button>
  </div>

</div>

<!-- BLUE BAR -->
<div class="blue-bar">
  ← Go Back
</div>

<!-- MAIN -->
<div class="container">

  <h2>Certificate ID: Mohammadjaved</h2>

  <div class="cert-box">

    <!-- JPG PREVIEW -->
    <img src="certificates/Mohammadjaved.jpg">

    <br>

    <!-- DOWNLOAD PDF -->
    <a href="certificates/Mohammadjaved.pdf" download>
      <button class="download-btn">Download Certificate</button>
    </a>

  </div>

</div>

</body>
</html>
