<!DOCTYPE html>
<html>
<head>
<title>NEB Verification</title>
<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

.header {
  display: flex;
  align-items: center;
  padding: 10px;
  background: white;
}

.header img {
  height: 50px;
  margin-right: 10px;
}

.title {
  font-size: 14px;
}

.blue-bar {
  background: #1e4fa3;
  color: white;
  padding: 10px;
}

.container {
  padding: 20px;
  text-align: center;
}

.cert-box {
  background: white;
  padding: 20px;
  display: inline-block;
  border: 1px solid #ccc;
}

.cert-box img {
  width: 100%;
  max-width: 500px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <div class="title">
    Government of Nepal<br>
    Ministry of Education<br>
    NEB Certificate Verification
  </div>
</div>

<div class="blue-bar">
  Certificate Verification System
</div>

<div class="container">
  <h2>Certificate ID: Mohammadjaved</h2>

  <div class="cert-box">
    <img src="certificates/Mohammadjaved.jpg">

    <br>

    <a href="certificates/Mohammadjaved.pdf" download>
      <button>Download Certificate</button>
    </a>
  </div>
</div>

</body>
</html>
