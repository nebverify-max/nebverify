<!DOCTYPE html>
<html>
<head>
<title>Certificate Verification</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  background: white;
  padding: 10px;
}

.header img {
  height: 45px;
  margin-right: 10px;
}

.title {
  font-size: 14px;
}

/* Top blue bar */
.blue-bar {
  background: #1e4fa3;
  color: white;
  padding: 10px;
}

/* Main */
.container {
  text-align: center;
  padding: 20px;
}

.cert-box {
  background: white;
  padding: 15px;
  display: inline-block;
  border: 1px solid #ccc;
}

/* Image */
.cert-box img {
  width: 100%;
  max-width: 500px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: #1e4fa3;
  color: white;
  border: none;
}
</style>

</head>

<body>

<div class="header">
  <img src="logo.png">
  <div class="title">
    Government of Nepal<br>
    Ministry of Education, Science and Technology<br>
    Curriculum Development Centre
  </div>
</div>

<div class="blue-bar">
  Online Certificate Verification
</div>

<div class="container">
  <h2 id="certID"></h2>

  <div class="cert-box">
    <img id="certImage">
    <br>
    <a id="pdfLink" download>
      <button>Download Certificate</button>
    </a>
  </div>
</div>

<script>
// URL se ID lena
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// ID show karna
document.getElementById("certID").innerText = "Certificate ID: " + id;

// Image set karna
document.getElementById("certImage").src = "certificates/" + id + ".jpg";

// PDF set karna
document.getElementById("pdfLink").href = "certificates/" + id + ".pdf";
</script>

</body>
</html>
