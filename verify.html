<!DOCTYPE html>
<html>
<head>
<title>NEB Verify</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* Top Header */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  border-bottom: 1px solid #ccc;
}

.left {
  display: flex;
  align-items: center;
}

.left img {
  height: 40px;
  margin-right: 10px;
}

.center-title {
  color: red;
  font-weight: bold;
}

.right a {
  margin-left: 15px;
  text-decoration: none;
  color: black;
}

.login-btn {
  background: #0b5ed7;
  color: white !important;
  padding: 5px 10px;
  border-radius: 3px;
}

/* Blue bar */
.bluebar {
  background: #1f5fbf;
  color: white;
  padding: 10px 20px;
  cursor: pointer;
}

/* Content */
.container {
  text-align: center;
  margin-top: 20px;
}

iframe {
  border: none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
  <div class="left">
    <!-- IMPORTANT: logo path sahi hona chahiye -->
    <img src="logo.png" onerror="this.style.display='none'">
    <div>
      <b>Government of Nepal</b><br>
      Ministry of Education, Science and Technology<br>
      Curriculum Development Centre, LOE
    </div>
  </div>

  <div class="center-title">
    Online System for Issuance of Letter of Equivalence
  </div>

  <div class="right">
    <a href="#">Help</a>
    <a href="#">Notice</a>
    <a href="#">FAQ</a>
    <a href="#" class="login-btn">Login</a>
  </div>
</div>

<!-- BLUE BAR -->
<div class="bluebar" onclick="history.back()">
  ← Go Back
</div>

<!-- CONTENT -->
<div class="container">

<div id="result"></div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(id){
  const pdfPath = "pdf/" + id + ".pdf";

  document.getElementById("result").innerHTML = `
    <h2>Certificate ID: ${id}</h2>

    <iframe src="${pdfPath}" width="80%" height="600px"></iframe>
    
    <br><br>

    <a href="${pdfPath}" download>
      <button style="padding:10px 20px; font-size:16px;">Download Certificate</button>
    </a>
  `;
}else{
  document.getElementById("result").innerHTML = "<h2>Invalid QR Code</h2>";
}
</script>

</div>

</body>
</html>
